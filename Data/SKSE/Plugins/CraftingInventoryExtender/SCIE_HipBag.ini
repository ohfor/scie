; SCIE Configuration for Hip Bag
; Mod: EatingSleepingDrinking - KuNeruNomu (Optional Hip Bag file)
; https://www.nexusmods.com/skyrimspecialedition/mods/65868
;
; Hip Bag provides two portable storage containers accessible from anywhere
; via hotkey. Single tap opens primary, double tap opens secondary.
;
; Both containers are in a hidden cell - perfect for global container access.

[GlobalContainers]
HipBag.esp|0x01000807 = true  ; Primary hip bag chest (single tap)
HipBag.esp|0x01000808 = true  ; Secondary hip bag chest (double tap)
