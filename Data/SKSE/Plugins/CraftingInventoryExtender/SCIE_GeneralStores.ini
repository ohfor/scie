; SCIE Configuration: General Stores
; https://www.nexusmods.com/skyrimspecialedition/mods/4322
;
; These are GLOBAL containers - accessible from any crafting station worldwide.
; They use General Stores' cloud storage "locker" system.
;
; FormIDs are persistent reference IDs (REFR), not base container IDs (CONT).
; Only crafting-relevant containers are included.

[GlobalContainers]
; Smithing
GeneralStores.esm|0x07F4FB = true    ; xGSxSmithStoreREF - Crafting Stores (master)
GeneralStores.esm|0x09FC7E = true    ; xGSxSmithySetCraftingREF - Workshop Crafting
GeneralStores.esm|0x09FC7F = true    ; xGSxSmithySetSmeltingREF - Workshop Smelting (ores/ingots)
GeneralStores.esm|0x09FC80 = true    ; xGSxSmithySetTanningREF - Workshop Tanning (leather/hides)

; Hearthfire Building
GeneralStores.esm|0x0073CD = true    ; xHFSxConstructionREF - HF Building Materials

; Alchemy
GeneralStores.esm|0x07F4F8 = true    ; xGSxAlchemyStoreREF - Alchemical Stores

; Cooking
GeneralStores.esm|0x099E99 = true    ; xGSxPantrySetSaltREF - Salt & Ingredients
GeneralStores.esm|0x099E9A = true    ; xGSxPantrySetRawREF - Raw Foodstuffs
GeneralStores.esm|0x099E9B = true    ; xGSxPantrySetCookedREF - Prepared Foodstuffs
GeneralStores.esm|0x07F501 = true    ; xGSxFoodStoreREF - Food Stores (master)

; Enchanting
GeneralStores.esm|0x07F4FD = true    ; xGSxGemStoreREF - Soulgem Stash
GeneralStores.esm|0x0138CA = true    ; xGSxGemstonesREF - Gemstones
