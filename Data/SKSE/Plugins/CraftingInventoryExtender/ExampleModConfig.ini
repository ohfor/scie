; Example Mod Author Configuration
; =================================
;
; This is an example INI file showing how mod authors can pre-configure
; containers in their player home mods to work with Crafting Inventory Extender.
;
; Place your INI file in: Data/SKSE/Plugins/CraftingInventoryExtender/
; Filename can be anything ending in .ini (e.g., SCIE_MyPlayerHome.ini)
;
; ============================================================
; MOD MANAGER TIPS (MO2, Vortex)
; ============================================================
;
; IMPORTANT: If you create custom INI files by editing files in the SCIE mod
; folder directly, they will be DELETED when you update SCIE using "Replace".
;
; Best practice for MO2:
;   1. Right-click in left pane -> "Create empty mod"
;   2. Name it something like "SCIE - My Custom INIs"
;   3. Create folder: SKSE/Plugins/CraftingInventoryExtender/
;   4. Put your custom INI files there
;   5. Place this mod AFTER SCIE in the left pane (lower = higher priority)
;
; This way your custom configs survive SCIE updates and are easy to backup.
;
; For Vortex users:
;   - Files in your Overwrite folder persist across updates
;   - Or create a separate empty mod the same way
;
; The MCM "Snapshot Marked Containers" feature saves to Overwrite (MO2) or
; the game's Data folder (manual install), which is safe from mod updates.

[Containers]
; Format: PluginName.esp|Identifier = true
;
; The identifier can be either a FormID or an EditorID:
;
;   FormID:   MyHome.esp|0x001ABC = true
;   EditorID: MyHome.esp|MyHomeStorageChest01 = true
;
; EditorID is often easier since you can see it directly in the Creation Kit
; or xEdit without worrying about load order. FormID is useful when containers
; don't have unique EditorIDs.

; ============================================================
; FORMID EXAMPLES
; ============================================================
; Use the REFERENCE FormID (not base record) in hexadecimal.
; Only use the local FormID (last 6 hex digits for ESP, last 3 for ESL).
;
; Finding FormIDs in xEdit:
; 1. Navigate to your placed container reference (under Cell or Worldspace)
; 2. The FormID column shows the full ID (e.g., 03001ABC)
; 3. Use only the local part: 0x001ABC

; ExamplePlayerHome.esp|0x001ABC = true    ; Basement storage chest
; ExamplePlayerHome.esp|0x001ABD = true    ; Kitchen pantry

; ============================================================
; EDITORID EXAMPLES (Recommended)
; ============================================================
; Use the container reference's EditorID directly.
; This is more readable and doesn't change with load order.
;
; Finding EditorIDs:
; - In Creation Kit: Select the reference, check the "Reference Editor ID" field
; - In xEdit: Look at the EDID subrecord of your placed reference

; ExamplePlayerHome.esp|MyHomeBasementChest01 = true    ; Basement storage
; ExamplePlayerHome.esp|MyHomeKitchenPantry = true      ; Kitchen pantry
; ExamplePlayerHome.esp|MyHomeAlchemyStorage = true     ; Alchemy supplies
; ExamplePlayerHome.esp|MyHomeSmithingChest = true      ; Smithing materials

; ============================================================
; DISABLING ENTRIES
; ============================================================
; Set to false (or omit) to disable an entry:

; ExamplePlayerHome.esp|0x001ABE = false   ; Disabled - won't be used
