; SCIE Configuration: Legacy of the Dragonborn - Safehouse
; https://www.nexusmods.com/skyrimspecialedition/mods/11802
;
; These are GLOBAL containers - accessible from any crafting station worldwide.
; They use LOTD's Quality Armory and Safehouse cloud storage system.
;
; IMPORTANT: Disable LOTD's built-in Craftloot feature to avoid conflicts:
;   LOTD MCM > General > Craftloot Status > Disabled
;
; FormIDs are persistent reference IDs (REFR), not base container IDs (CONT).
; Based on working configuration from CraftingPullFromContainers.

