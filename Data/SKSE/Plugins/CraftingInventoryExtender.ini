; Crafting Inventory Extender - Main Configuration
; ================================================

[General]
; Enable/disable the plugin entirely
bEnabled=true

; Automatically add SCIE powers to player on game load
bAddPowersToPlayer=true

; Maximum distance (in game units) to search for containers
; 768 = small room, 1500 = large room, 3000 = whole building
fMaxContainerDistance=3000.0

; Consumption priority when crafting (not yet implemented)
; true = consume from player inventory first, then containers
; false = consume from containers first, then player inventory
bConsumeFromPlayerFirst=true

[Debug]
; Log verbosity: 0=Info (normal), 1=Debug (troubleshooting), 2=Trace (extreme detail)
iLogLevel=0
